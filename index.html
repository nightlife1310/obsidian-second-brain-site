<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Hermes Second Brain — интерактивный граф</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#070b18;color:#eef3ff;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}#app{height:100%;display:grid;grid-template-rows:auto 1fr}header{padding:12px 14px;background:linear-gradient(180deg,rgba(18,26,51,.96),rgba(18,26,51,.72));border-bottom:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);z-index:2}h1{font-size:clamp(20px,5vw,34px);margin:0 0 6px}.hint{font-size:14px;color:#a9b5d6;line-height:1.35}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#eef3ff;border-radius:999px;padding:9px 12px;font-size:14px}button:active{transform:scale(.98)}#stage{position:relative;touch-action:none;overflow:hidden;background:radial-gradient(circle at top,#17234b,#070b18 60%)}svg{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.panel{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(18,26,51,.9);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;box-shadow:0 20px 60px rgba(0,0,0,.35);max-height:34vh;overflow:auto}.panel h2{font-size:17px;margin:0 0 6px}.panel p{margin:4px 0;color:#a9b5d6;font-size:14px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 9px;color:#cbd5f5;font-size:13px}.dot{width:10px;height:10px;border-radius:50%}text{user-select:none;pointer-events:none}@media(min-width:850px){.panel{left:auto;width:360px;top:92px;bottom:auto;right:18px;max-height:calc(100vh - 120px)}header{padding:16px 20px}}
</style></head><body><div id="app"><header><h1>Hermes Second Brain — интерактивный граф</h1><div class="hint">Пальцами: потяни пустое место — двигать карту, щипок — масштаб. Узлы можно перетаскивать. Нажми на узел — детали.</div><div class="toolbar"><button id="fit">Показать всё</button><button id="shake">Оживить связи</button><button id="freeze">Пауза</button></div></header><main id="stage"><svg id="svg"><g id="viewport"><g id="links"></g><g id="nodes"></g></g></svg><aside class="panel" id="panel"><h2>Карта знаний</h2><p>7 заметок · 19 связей</p><div class="legend"><span class="pill"><i class="dot" style="background:#7dd3fc"></i>Главная</span><span class="pill"><i class="dot" style="background:#f0abfc"></i>Проекты</span><span class="pill"><i class="dot" style="background:#86efac"></i>Знания</span></div><p style="margin-top:10px">Это уже не картинка: граф живой, его можно двигать, масштабировать и раскладывать.</p></aside></main></div><script>
const rawNodes=[{"id": "00 Главная карта.md", "label": "00 Главная карта", "group": "root", "x": 0, "y": 0}, {"id": "01 Projects/CRM beauty universal.md", "label": "CRM beauty universal", "group": "01 Projects", "x": 0, "y": 0}, {"id": "01 Projects/Поддержка малого бизнеса Приморья.md", "label": "Поддержка малого бизнеса Приморья", "group": "01 Projects", "x": 0, "y": 0}, {"id": "01 Projects/Бизнес-ассистент и презентация бота.md", "label": "Бизнес-ассистент и презентация бота", "group": "01 Projects", "x": 0, "y": 0}, {"id": "02 Knowledge/Продуктовые принципы Никиты.md", "label": "Продуктовые принципы Никиты", "group": "02 Knowledge", "x": 0, "y": 0}, {"id": "02 Knowledge/Карта проектов.md", "label": "Карта проектов", "group": "02 Knowledge", "x": 0, "y": 0}, {"id": "02 Knowledge/Как Hermes использует Obsidian.md", "label": "Как Hermes использует Obsidian", "group": "02 Knowledge", "x": 0, "y": 0}];
const rawLinks=[{"source": "00 Главная карта.md", "target": "01 Projects/CRM beauty universal.md"}, {"source": "00 Главная карта.md", "target": "01 Projects/Поддержка малого бизнеса Приморья.md"}, {"source": "00 Главная карта.md", "target": "01 Projects/Бизнес-ассистент и презентация бота.md"}, {"source": "00 Главная карта.md", "target": "02 Knowledge/Как Hermes использует Obsidian.md"}, {"source": "00 Главная карта.md", "target": "02 Knowledge/Карта проектов.md"}, {"source": "01 Projects/CRM beauty universal.md", "target": "02 Knowledge/Карта проектов.md"}, {"source": "01 Projects/CRM beauty universal.md", "target": "01 Projects/Поддержка малого бизнеса Приморья.md"}, {"source": "01 Projects/CRM beauty universal.md", "target": "02 Knowledge/Продуктовые принципы Никиты.md"}, {"source": "01 Projects/Поддержка малого бизнеса Приморья.md", "target": "01 Projects/CRM beauty universal.md"}, {"source": "01 Projects/Поддержка малого бизнеса Приморья.md", "target": "01 Projects/Бизнес-ассистент и презентация бота.md"}, {"source": "01 Projects/Поддержка малого бизнеса Приморья.md", "target": "02 Knowledge/Карта проектов.md"}, {"source": "01 Projects/Поддержка малого бизнеса Приморья.md", "target": "02 Knowledge/Продуктовые принципы Никиты.md"}, {"source": "01 Projects/Бизнес-ассистент и презентация бота.md", "target": "01 Projects/Поддержка малого бизнеса Приморья.md"}, {"source": "01 Projects/Бизнес-ассистент и презентация бота.md", "target": "02 Knowledge/Карта проектов.md"}, {"source": "02 Knowledge/Карта проектов.md", "target": "01 Projects/CRM beauty universal.md"}, {"source": "02 Knowledge/Карта проектов.md", "target": "01 Projects/Поддержка малого бизнеса Приморья.md"}, {"source": "02 Knowledge/Карта проектов.md", "target": "01 Projects/Бизнес-ассистент и презентация бота.md"}, {"source": "02 Knowledge/Карта проектов.md", "target": "02 Knowledge/Как Hermes использует Obsidian.md"}, {"source": "02 Knowledge/Карта проектов.md", "target": "02 Knowledge/Продуктовые принципы Никиты.md"}];
const color={root:'#7dd3fc','01 Projects':'#f0abfc','02 Knowledge':'#86efac'};
const svg=document.getElementById('svg'), vp=document.getElementById('viewport'), linksG=document.getElementById('links'), nodesG=document.getElementById('nodes'), stage=document.getElementById('stage'), panel=document.getElementById('panel');
let W=stage.clientWidth,H=stage.clientHeight, scale=1, tx=W/2, ty=H/2, running=true;
const nodes=rawNodes.map((n,i)=>{let a=2*Math.PI*i/rawNodes.length;return {...n,x:Math.cos(a)*220,y:Math.sin(a)*220,vx:0,vy:0,fx:null,fy:null}});
const byId=new Map(nodes.map(n=>[n.id,n]));
const links=rawLinks.map(l=>({source:byId.get(l.source),target:byId.get(l.target)})).filter(l=>l.source&&l.target);
function setView(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
function el(tag,attrs={}){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const [k,v] of Object.entries(attrs))e.setAttribute(k,v);return e;}
const linkEls=links.map(l=>{const e=el('line',{stroke:'rgba(255,255,255,.28)','stroke-width':'2.2'});linksG.appendChild(e);return e;});
const nodeEls=nodes.map(n=>{const g=el('g');g.style.cursor='grab';const r=n.group==='root'?28:23;g.appendChild(el('circle',{r,fill:color[n.group]||'#ddd',stroke:'#fff','stroke-width':2,'filter':'drop-shadow(0 8px 8px rgba(0,0,0,.35))'}));let t=el('text',{x:r+8,y:5,fill:'#eef3ff','font-size':13,'font-family':'Inter,Arial','paint-order':'stroke',stroke:'#070b18','stroke-width':4});t.textContent=n.label;g.appendChild(t);g.addEventListener('pointerdown',ev=>startDragNode(ev,n,g));g.addEventListener('click',()=>selectNode(n));nodesG.appendChild(g);return g;});
function selectNode(n){const connected=links.filter(l=>l.source===n||l.target===n).map(l=>(l.source===n?l.target:l.source).label);panel.innerHTML=`<h2>${n.label}</h2><p><b>Файл:</b> ${n.id}</p><p><b>Тип:</b> ${n.group==='root'?'главная карта':n.group}</p><p><b>Связи:</b> ${connected.length?connected.join(', '):'нет'}</p><div class="legend"><span class="pill"><i class="dot" style="background:${color[n.group]||'#ddd'}"></i>${n.group}</span></div>`;}
function tick(){if(running){for(let k=0;k<2;k++){for(const n of nodes){n.vx*=0.86;n.vy*=0.86;}
for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+0.01,force=3600/d2;let d=Math.sqrt(d2);dx/=d;dy/=d;a.vx+=dx*force;b.vx-=dx*force;a.vy+=dy*force;b.vy-=dy*force;}
for(const l of links){let a=l.source,b=l.target,dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,target=145,force=(d-target)*0.012;dx/=d;dy/=d;a.vx+=dx*force;b.vx-=dx*force;a.vy+=dy*force;b.vy-=dy*force;}
for(const n of nodes){n.vx+=(-n.x)*0.002;n.vy+=(-n.y)*0.002;if(n.fx!==null){n.x=n.fx;n.y=n.fy;}else{n.x+=n.vx;n.y+=n.vy;}}}
links.forEach((l,i)=>{linkEls[i].setAttribute('x1',l.source.x);linkEls[i].setAttribute('y1',l.source.y);linkEls[i].setAttribute('x2',l.target.x);linkEls[i].setAttribute('y2',l.target.y);});
nodes.forEach((n,i)=>nodeEls[i].setAttribute('transform',`translate(${n.x},${n.y})`));requestAnimationFrame(tick);}
let dragging=null, pan=null, pinch=null;
function screenToWorld(x,y){return {x:(x-tx)/scale,y:(y-ty)/scale};}
function startDragNode(ev,n,g){ev.preventDefault();ev.stopPropagation();g.setPointerCapture(ev.pointerId);dragging={id:ev.pointerId,n,g};g.style.cursor='grabbing';const move=e=>{if(!dragging||e.pointerId!==dragging.id)return;const p=screenToWorld(e.clientX,e.clientY);n.fx=p.x;n.fy=p.y;};const up=e=>{if(!dragging||e.pointerId!==dragging.id)return;n.fx=null;n.fy=null;g.style.cursor='grab';g.releasePointerCapture(e.pointerId);dragging=null;window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);}
const touches=new Map();stage.addEventListener('pointerdown',e=>{if(e.target.closest('g'))return;stage.setPointerCapture(e.pointerId);touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===1)pan={x:e.clientX,y:e.clientY,tx,ty};if(touches.size===2){const arr=[...touches.values()];pinch={d:Math.hypot(arr[0].x-arr[1].x,arr[0].y-arr[1].y),scale,tx,ty,cx:(arr[0].x+arr[1].x)/2,cy:(arr[0].y+arr[1].y)/2};});
stage.addEventListener('pointermove',e=>{if(!touches.has(e.pointerId))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===1&&pan){tx=pan.tx+e.clientX-pan.x;ty=pan.ty+e.clientY-pan.y;setView();}if(touches.size===2&&pinch){const arr=[...touches.values()],d=Math.hypot(arr[0].x-arr[1].x,arr[0].y-arr[1].y);let ns=Math.max(.35,Math.min(3.5,pinch.scale*d/pinch.d));scale=ns;tx=pinch.tx;ty=pinch.ty;setView();});
function endTouch(e){touches.delete(e.pointerId);pan=null;pinch=null;}stage.addEventListener('pointerup',endTouch);stage.addEventListener('pointercancel',endTouch);
svg.addEventListener('wheel',e=>{e.preventDefault();const old=scale;const ns=Math.max(.35,Math.min(3.5,scale*(e.deltaY<0?1.12:.88)));const wx=(e.clientX-tx)/old, wy=(e.clientY-ty)/old;scale=ns;tx=e.clientX-wx*scale;ty=e.clientY-wy*scale;setView();},{passive:false});
document.getElementById('fit').onclick=()=>{scale=Math.min(W,H)/720;tx=W/2;ty=H/2;setView();};document.getElementById('shake').onclick=()=>{running=true;for(const n of nodes){n.vx+=(Math.random()-.5)*14;n.vy+=(Math.random()-.5)*14;}};document.getElementById('freeze').onclick=()=>running=!running;
window.addEventListener('resize',()=>{W=stage.clientWidth;H=stage.clientHeight;});setView();tick();
</script></body></html>
